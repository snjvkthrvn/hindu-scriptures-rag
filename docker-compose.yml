# Hindu Scriptures RAG — full stack
# Usage: docker compose up -d --build
# Qdrant only: docker compose up -d qdrant

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  rag:
    build: .
    working_dir: /app/english-v1-rag
    command:
      - gunicorn
      - --bind=0.0.0.0:5002
      - --workers=2
      - --timeout=120
      - --access-logfile=-
      - app:app
    ports:
      - "5002:5002"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./final:/app/final:ro
    depends_on:
      - qdrant
    restart: unless-stopped

volumes: {}
